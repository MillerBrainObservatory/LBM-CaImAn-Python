[workspace]
name = "lbm-caiman-python"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

[dependencies]
python = ">=3.12.7,<3.12.10"
caiman = "*"
# caiman pulls numpy/setuptools unbounded; cap them into mbo_utilities' ranges
# (numpy<2.4, setuptools<81) so the conda solve does not override the pypi solve
numpy = ">=2.2.5,<2.4"
setuptools = "<81"
pip = "*"

[pypi-dependencies]
lbm-caiman-python = { path = ".", editable = true }
mbo-utilities = ">=3.1.0"
# lsp 3.2.1+ matches the mbo_utilities 3.x module layout; older lsp imports
# the removed mbo_utilities.util and breaks figure generation
lbm-suite2p-python = ">=3.2.1"
suite2p = ">=1.0.0.1"

[tasks]
test = "pytest"
lint = "ruff check lbm_caiman_python"
format = "ruff format lbm_caiman_python"
setup-caiman = "caimanmanager install"

[feature.dev.dependencies]
ruff = "*"
pytest = "*"

[environments]
default = { features = ["dev"], solve-group = "default" }
